<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>搜索 · Markets</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M20 65L40 45L55 60L80 30' stroke='%2330d158' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <nav class="tabs">
    <a href="index.html">现在</a>
    <a href="search.html" class="is-current">搜索</a>
    <a href="about.html">说明</a>
  </nav>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="m20 20-3.5-3.5"/>
    </svg>
    <input type="text" id="search-input" class="search-input" placeholder="代码或公司名 · AAPL · NVDA · Apple..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
    <button id="search-clear" class="search-clear" aria-label="清除">✕</button>
  </div>

  <!-- My favourites -->
  <div class="card">
    <div class="card-head">
      <h3 class="card-title">⭐ 我的关注</h3>
      <span class="card-sub" id="fav-count">0 只</span>
    </div>
    <div id="fav-list"></div>
  </div>

  <!-- Search results -->
  <div class="card" id="results-card" style="display:none;">
    <div class="card-head">
      <h3 class="card-title">搜索结果</h3>
      <span class="card-sub" id="results-count"></span>
    </div>
    <div id="results-list"></div>
  </div>

  <!-- Initial hint -->
  <div class="card" id="initial-card">
    <p style="font-size:13px;color:var(--text-2);line-height:1.6;margin:0;">
      搜索未来 180 天内有财报的美股。点 ⭐ 加入收藏后会显示在首页。<br><br>
      <span style="color:var(--text-3);font-size:12px;">注:数据涵盖 ~6 个月,某些公司下次财报超出窗口可能搜不到。</span>
    </p>
  </div>

  <p class="foot">数据每天自动更新 · 收藏保存在本设备浏览器</p>

</div>

<script src="markets.js"></script>
<script>
(function () {
  const M = window.MarketsLib;
  const input = document.getElementById('search-input');
  const clearBtn = document.getElementById('search-clear');
  const resultsCard = document.getElementById('results-card');
  const resultsList = document.getElementById('results-list');
  const resultsCount = document.getElementById('results-count');
  const initialCard = document.getElementById('initial-card');
  const favList = document.getElementById('fav-list');
  const favCount = document.getElementById('fav-count');

  function buildItemsForSymbols(symbols) {
    const now = new Date();
    return symbols.map(sym => {
      const next = M.nextEarningsFor(sym);
      if (!next) return { kind: 'missing', symbol: sym };
      return {
        kind: 'earn',
        sydDate: next.sydDate,
        symbol: next.s,
        name: next.n,
        type: next.t,
        major: !!next.maj,
        favourite: M.isFavourite(next.s),
        eps: next.eps,
      };
    });
  }

  function renderResults(query) {
    const q = (query || '').trim();
    if (!q) {
      resultsCard.style.display = 'none';
      initialCard.style.display = '';
      return;
    }
    initialCard.style.display = 'none';
    resultsCard.style.display = '';

    const matches = M.searchEntries(q, { limit: 30 });
    resultsCount.textContent = matches.length + ' 匹配';

    if (matches.length === 0) {
      resultsList.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>找不到匹配的公司<br><span style="font-size:12px;color:var(--text-3);">未来 180 天内可能没有该公司的财报</span></div>';
      return;
    }

    // Get unique symbols, then render via shared agenda renderer
    const symbols = [...new Set(matches.map(e => e.s))];
    const items = buildItemsForSymbols(symbols).filter(it => it.kind === 'earn');

    M.renderAgendaItems(items, resultsList, {
      showFavBtn: true,
      onChange: () => {
        renderFavourites();
        renderResults(input.value);
      }
    });

    // Append "missing" symbols (no upcoming earnings) as plain rows if any
    const missing = buildItemsForSymbols(symbols).filter(it => it.kind === 'missing');
    if (missing.length > 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.style.fontSize = '12px';
      div.style.padding = '10px 0 4px';
      div.style.borderTop = '0.5px solid var(--divider)';
      div.style.marginTop = '6px';
      div.innerHTML = missing.map(m => m.symbol).join(', ') + '：未来 180 天内暂无财报';
      resultsList.appendChild(div);
    }
  }

  function renderFavourites() {
    const favs = M.getFavourites();
    favCount.textContent = favs.length + ' 只';

    if (favs.length === 0) {
      favList.innerHTML = '<div class="empty"><div class="empty-icon">⭐</div>还没有收藏的股票<br><span style="font-size:12px;color:var(--text-3);">搜索后点 ⭐ 加入</span></div>';
      return;
    }

    const items = buildItemsForSymbols(favs);
    const earned = items.filter(it => it.kind === 'earn');
    const missing = items.filter(it => it.kind === 'missing');

    M.renderAgendaItems(earned, favList, {
      showFavBtn: true,
      onChange: () => {
        renderFavourites();
        if (input.value.trim()) renderResults(input.value);
      }
    });

    if (missing.length > 0) {
      missing.forEach(m => {
        const div = document.createElement('div');
        div.className = 'ag-item';
        div.innerHTML = `
          <div class="ag-icon is-fav"><span class="ag-icon-text">⭐</span></div>
          <div class="ag-info">
            <div class="ag-title">${m.symbol}</div>
            <div class="ag-meta" style="color:var(--text-3);">180 天内暂无财报</div>
          </div>
          <div class="ag-when"></div>
          <button class="fav-btn is-fav" data-sym="${m.symbol}"><svg viewBox="0 0 24 24"><path d="M12 2.5l2.95 6.55 7.05.62-5.36 4.65 1.6 6.93L12 17.6l-6.24 3.65 1.6-6.93L2 9.67l7.05-.62z"/></svg></button>
        `;
        favList.appendChild(div);
      });
      favList.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          M.toggleFavourite(btn.getAttribute('data-sym'));
          renderFavourites();
          if (input.value.trim()) renderResults(input.value);
        });
      });
    }
  }

  // Search input
  let searchTimer = null;
  input.addEventListener('input', () => {
    clearBtn.classList.toggle('is-visible', input.value.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderResults(input.value), 100);
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('is-visible');
    renderResults('');
    input.focus();
  });

  renderFavourites();
  M.onEarningsUpdate(() => {
    renderFavourites();
    if (input.value.trim()) renderResults(input.value);
  });
})();
</script>
</body>
</html>
