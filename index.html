<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Markets</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M20 65L40 45L55 60L80 30' stroke='%2330d158' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <nav class="tabs">
    <a href="index.html" class="is-current">现在</a>
    <a href="search.html">搜索</a>
    <a href="about.html">说明</a>
  </nav>

  <!-- Hero: clock + status combined -->
  <div class="card hero">
    <div class="hero-top">
      <div>
        <div class="hero-clock" id="clock">––:––:––</div>
        <div class="hero-date" id="date">––</div>
      </div>
      <div class="hero-status">
        <span class="status-pill is-off" id="asx-pill">
          <span class="dot"></span>
          <span>ASX <span id="asx-detail">––</span></span>
        </span>
        <span class="status-pill is-off" id="us-pill">
          <span class="dot"></span>
          <span>US <span id="us-detail">––</span></span>
        </span>
      </div>
    </div>
    <div class="hero-next">
      <span class="hero-next-label">接下来</span>
      <span class="hero-next-text">
        <span id="next-event">––</span>
        <span class="countdown" id="next-countdown">––</span>
      </span>
    </div>
  </div>

  <!-- Timeline -->
  <div class="card tl-card">
    <div class="card-head">
      <h3 class="card-title">未来 12 小时</h3>
      <span class="card-sub">悉尼时间</span>
    </div>
    <div class="tl-stage">
      <div class="tl-bar" id="tl-bar">
        <span class="tl-now"></span>
        <span class="tl-now-label">现在</span>
      </div>
      <div class="tl-axis" id="tl-axis"></div>
    </div>
    <div class="tl-legend">
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--green-soft)"></span>ASX</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--blue-soft)"></span>美股盘前</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--blue)"></span>美股开盘</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--indigo)"></span>美股盘后</span>
    </div>
  </div>

  <!-- Unified 7-day agenda: favs + major earnings + macro events -->
  <div class="card">
    <div class="card-head">
      <h3 class="card-title">接下来 7 天</h3>
      <span class="card-sub" id="agenda-sub">悉尼时间</span>
    </div>
    <div id="agenda-7"></div>
  </div>

  <p class="foot">所有时间均为悉尼当地时间 · 自动适配夏令时</p>

</div>

<script src="markets.js"></script>
<script>
(function () {
  const M = window.MarketsLib;

  let lastTimelineMinute = -1;
  let lastAgendaMinute = -1;

  function applyPill(el, state) {
    el.classList.remove('is-on', 'is-soon', 'is-off');
    el.classList.add('is-' + state);
  }

  function update() {
    const now = new Date();
    const sydP = M.partsInTz(M.SYD, now);

    // Clock
    document.getElementById('clock').textContent = M.fmtClockHMS(sydP);
    document.getElementById('date').textContent =
      M.DAY_LONG_EN[sydP.dayIdx] + ', ' + sydP.day + ' ' + sydP.month + ' ' + sydP.year + ' · ' + sydP.timeZoneName;

    // Status pills
    const asxSt = M.asxStatusText(now);
    const usSt = M.usStatusText(now);
    applyPill(document.getElementById('asx-pill'), asxSt.state);
    applyPill(document.getElementById('us-pill'), usSt.state);
    document.getElementById('asx-detail').textContent = asxSt.text;
    document.getElementById('us-detail').textContent = usSt.text;

    // Up next
    const nx = M.findNextEvent(now);
    if (nx) {
      document.getElementById('next-event').textContent = nx.label;
      document.getElementById('next-countdown').textContent = M.fmtCountdown(nx.time - now);
    }

    // Timeline (rebuild every minute)
    const minuteKey = Math.floor(now.getTime() / 60000);
    if (minuteKey !== lastTimelineMinute) {
      M.renderTimeline(now, document.getElementById('tl-bar'), document.getElementById('tl-axis'), 12);
      lastTimelineMinute = minuteKey;
    }

    // Agenda (rebuild every 5 minutes is plenty)
    const agendaKey = Math.floor(now.getTime() / (5 * 60000));
    if (agendaKey !== lastAgendaMinute) {
      renderAgenda();
      lastAgendaMinute = agendaKey;
    }

    // Tab title
    let tab = '';
    if (asxSt.state === 'on' && usSt.state === 'on') tab = 'ASX & US 开市';
    else if (asxSt.state === 'on') tab = 'ASX 开市';
    else if (usSt.state === 'on') tab = '美股开市';
    else if (usSt.state === 'soon') tab = '美股 ' + usSt.text;
    else if (asxSt.state === 'soon') tab = 'ASX ' + asxSt.text;
    else tab = '休市';
    document.title = tab + ' · Markets';
  }

  function renderAgenda() {
    const now = new Date();
    const items = M.buildAgenda(now, { days: 7, includeMinor: false });
    const container = document.getElementById('agenda-7');
    M.renderAgendaItems(items, container, {
      limit: 12,
      showFavBtn: true,
      onChange: renderAgenda,
      emptyMsg: '未来 7 天暂无重要事件'
    });

    // Update sub label
    const favs = M.getFavourites();
    const subEl = document.getElementById('agenda-sub');
    if (favs.length > 0) {
      subEl.textContent = '⭐ ' + favs.length + ' 只关注';
    } else {
      subEl.textContent = '主流公司 + 宏观';
    }
  }

  update();
  setInterval(update, 1000);
  M.onEarningsUpdate(renderAgenda);
})();
</script>
</body>
</html>
