<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>搜索 · Markets</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M20 65L40 45L55 60L80 30' stroke='%2330d158' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <a href="index.html" class="nav-back">‹ 返回</a>
    <div class="nav-links">
      <a href="index.html">现在</a>
      <a href="earnings.html">财报</a>
      <a href="search.html" class="is-current">搜索</a>
      <a href="about.html">说明</a>
    </div>
  </nav>

  <h1 class="page-title">搜索</h1>
  <p class="page-subtitle">输入股票代码或公司名,⭐ 收藏后会显示在首页</p>

  <!-- Search box -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="m20 20-3.5-3.5"/>
    </svg>
    <input type="text" id="search-input" class="search-input" placeholder="AAPL · Apple · NVDA..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
    <button id="search-clear" class="search-clear" aria-label="Clear">✕</button>
  </div>

  <!-- My favourites -->
  <div class="card" id="fav-card">
    <div class="card-head">
      <h3 class="card-title">⭐ 我的关注</h3>
      <span class="card-sub" id="fav-count">0 只</span>
    </div>
    <div id="fav-list"></div>
  </div>

  <!-- Search results -->
  <div class="card" id="results-card" style="display:none;">
    <div class="card-head">
      <h3 class="card-title">搜索结果</h3>
      <span class="card-sub" id="results-count"></span>
    </div>
    <div id="results-list"></div>
  </div>

  <!-- Initial state when no search -->
  <div class="card" id="initial-card">
    <div class="card-head">
      <h3 class="card-title">提示</h3>
      <span class="card-sub">未来 90 天</span>
    </div>
    <p style="font-size:14px;color:var(--text-2);line-height:1.6;margin:0;">
      输入框里支持代码或公司名搜索。例如 <strong>AAPL</strong>、<strong>microsoft</strong>、<strong>NVDA</strong>。<br>
      搜索结果中点 ⭐ 加入收藏。本设备保存,不需要账号。
    </p>
  </div>

  <p class="foot">数据自动每天更新一次 · 财报时间已转换为悉尼时间</p>

</div>

<script src="markets.js"></script>
<script>
(function () {
  const M = window.MarketsLib;
  const input = document.getElementById('search-input');
  const clearBtn = document.getElementById('search-clear');
  const resultsCard = document.getElementById('results-card');
  const resultsList = document.getElementById('results-list');
  const resultsCount = document.getElementById('results-count');
  const initialCard = document.getElementById('initial-card');
  const favList = document.getElementById('fav-list');
  const favCount = document.getElementById('fav-count');

  function starSvg(filled) {
    return '<svg viewBox="0 0 24 24"><path d="M12 2.5l2.95 6.55 7.05.62-5.36 4.65 1.6 6.93L12 17.6l-6.24 3.65 1.6-6.93L2 9.67l7.05-.62z"/></svg>';
  }

  function renderResults(query) {
    const q = (query || '').trim();
    if (!q) {
      resultsCard.style.display = 'none';
      initialCard.style.display = '';
      return;
    }
    initialCard.style.display = 'none';
    resultsCard.style.display = '';

    const matches = M.searchEntries(q, { limit: 30 });
    resultsCount.textContent = matches.length + ' 匹配';

    if (matches.length === 0) {
      resultsList.innerHTML = '<div class="empty"><div class="icon">🔍</div>找不到匹配的公司<br><span style="font-size:12px;">未来 90 天的财报数据可能未涵盖这只股票</span></div>';
      return;
    }

    const now = new Date();
    resultsList.innerHTML = '';
    matches.forEach(e => {
      // Get next earnings for this symbol (it's already e itself, but normalize)
      const next = M.nextEarningsFor(e.s);
      if (!next) return;

      const sydDate = next.sydDate;
      const rel = M.relativeDay(sydDate, now);
      const diffDays = Math.round((sydDate - now) / (24 * 3600 * 1000));
      const isSoon = diffDays <= 2;

      const isFav = M.isFavourite(e.s);
      const tagText = next.t === 'BMO' ? '盘前' : '盘后';

      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <div class="result-info">
          <div>
            <span class="result-sym">${e.s}</span>
            <span class="result-name">${escapeHtml(e.n || '')}</span>
          </div>
          <div class="result-when">
            ${M.fmtSydneyForAgenda(sydDate)}
            <span class="result-when-tag">${tagText}</span>
          </div>
        </div>
        <span class="result-rel ${isSoon ? 'is-soon' : ''}">${rel || ''}</span>
        <button class="fav-btn ${isFav ? 'is-fav' : ''}" data-sym="${e.s}" aria-label="收藏">${starSvg(isFav)}</button>
      `;
      resultsList.appendChild(row);
    });

    // Wire up fav buttons
    resultsList.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sym = btn.getAttribute('data-sym');
        const isNow = M.toggleFavourite(sym);
        btn.classList.toggle('is-fav', isNow);
        renderFavourites();
      });
    });
  }

  function renderFavourites() {
    const now = new Date();
    const favs = M.getFavouriteEarnings(now);
    favCount.textContent = favs.length + ' 只';

    if (favs.length === 0) {
      favList.innerHTML = '<div class="empty"><div class="icon">⭐</div>还没有关注的股票<br><span style="font-size:12px;">搜索后点击 ⭐ 加入</span></div>';
      return;
    }

    favList.innerHTML = '';
    favs.forEach(f => {
      const row = document.createElement('div');
      row.className = 'result-row';

      if (f.missing) {
        row.innerHTML = `
          <div class="result-info">
            <div><span class="result-sym">${f.symbol}</span></div>
            <div class="result-when" style="color: var(--text-3);">未来 90 天内暂无财报数据</div>
          </div>
          <span class="result-rel"></span>
          <button class="fav-btn is-fav" data-sym="${f.symbol}" aria-label="取消收藏">${starSvg(true)}</button>
        `;
      } else {
        const rel = M.relativeDay(f.sydDate, now);
        const diffDays = Math.round((f.sydDate - now) / (24 * 3600 * 1000));
        const isSoon = diffDays <= 2;
        const tagText = f.t === 'BMO' ? '盘前' : '盘后';
        row.innerHTML = `
          <div class="result-info">
            <div>
              <span class="result-sym">${f.symbol}</span>
              <span class="result-name">${escapeHtml(f.n || '')}</span>
            </div>
            <div class="result-when">
              ${M.fmtSydneyForAgenda(f.sydDate)}
              <span class="result-when-tag">${tagText}</span>
            </div>
          </div>
          <span class="result-rel ${isSoon ? 'is-soon' : ''}">${rel || ''}</span>
          <button class="fav-btn is-fav" data-sym="${f.symbol}" aria-label="取消收藏">${starSvg(true)}</button>
        `;
      }
      favList.appendChild(row);
    });

    favList.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sym = btn.getAttribute('data-sym');
        M.toggleFavourite(sym);
        renderFavourites();
        // Re-render results too in case this symbol is currently shown there
        if (input.value.trim()) renderResults(input.value);
      });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // Search input handlers
  let searchTimer = null;
  input.addEventListener('input', () => {
    clearBtn.classList.toggle('is-visible', input.value.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderResults(input.value), 100);
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('is-visible');
    renderResults('');
    input.focus();
  });

  // Initial render
  renderFavourites();

  // Re-render when earnings data finishes loading
  M.onEarningsUpdate(() => {
    renderFavourites();
    if (input.value.trim()) renderResults(input.value);
  });
})();
</script>
</body>
</html>
