<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>本周财报 · Markets</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Cpath d='M20 65L40 45L55 60L80 30' stroke='%2330d158' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <a href="index.html" class="nav-back">‹ 返回</a>
    <div class="nav-links">
      <a href="index.html">现在</a>
      <a href="earnings.html" class="is-current">财报</a>
      <a href="about.html">说明</a>
    </div>
  </nav>

  <h1 class="page-title">本周财报</h1>
  <p class="page-subtitle">所有时间已转换为悉尼时间 · 按发布顺序排列</p>

  <!-- 24h timeline at top of earnings page -->
  <div class="card">
    <div class="card-head">
      <h3 class="card-title">未来 24 小时市场状态</h3>
      <span class="card-sub">悉尼时间</span>
    </div>
    <div class="tl-stage">
      <div class="tl-bar" id="tl-bar">
        <span class="tl-now"></span>
        <span class="tl-now-label">NOW</span>
      </div>
      <div class="tl-axis" id="tl-axis"></div>
    </div>
    <div class="tl-legend">
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--green-soft)"></span>ASX 交易</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--blue-soft)"></span>美股盘前</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--blue)"></span>美股正常</span>
      <span class="tl-legend-item"><span class="legend-swatch" style="background: var(--indigo)"></span>美股盘后</span>
    </div>
  </div>

  <!-- Full agenda -->
  <div class="card">
    <div class="card-head">
      <h3 class="card-title">完整日历 · Q1 2026</h3>
      <span class="card-sub">悉尼时间</span>
    </div>
    <div id="agenda-full"></div>
  </div>

  <p class="foot">"美股盘后"约为悉尼次日清晨 · "美股盘前"约为悉尼当日傍晚 · 时间已自动适配夏令时</p>

</div>

<script src="markets.js"></script>
<script>
(function () {
  const M = window.MarketsLib;
  let lastTimelineMinute = -1;
  let lastAgendaHour = -1;

  function update() {
    const now = new Date();

    const minuteKey = Math.floor(now.getTime() / 60000);
    if (minuteKey !== lastTimelineMinute) {
      M.renderTimeline(now, document.getElementById('tl-bar'), document.getElementById('tl-axis'), 24);
      lastTimelineMinute = minuteKey;
    }

    const hourKey = Math.floor(now.getTime() / 3600000);
    if (hourKey !== lastAgendaHour) {
      M.renderAgenda(now, document.getElementById('agenda-full'));
      lastAgendaHour = hourKey;
    }
  }

  update();
  setInterval(update, 30000);
})();
</script>
</body>
</html>
